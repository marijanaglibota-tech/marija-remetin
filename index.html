<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>Zdrav život u Solinu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="title">Zdrav život u našem Solinu</h1>

<div class="grid">

    <section class="box">
        <h2>Naslovna</h2>
        <p>Kratki uvod u zdrav život u Solinu.</p>

        <div class="buttons">
            <button>Zdrava jela</button>
            <button>Planine</button>
            <button>Rijeke</button>
            <button>Priroda</button>
        </div>
    </section>

    <section class="box">
        <h2>Zdrava jela</h2>
        <p>Ovdje ćete naći neka nova zdrava jela.</p>
        <div class="item">🍲 Jelo 1 – sastojci</div>
        <div class="item">🥗 Jelo 2 – upute</div>
    </section>

    <section class="box">
        <h2>Izletišta i planine</h2>
        <p>Planine i izletišta koja možete posjetiti u Solinu.</p>
